  text: "Set in the streets of an unknown german city in the 90s - Jakarta, a 21-year-old Indonesian, is obsessed with the legendary stories his father told him as a child. Just like in those stories, he wants to create something special. When he falls in love with a mysterious, blue-haired hairdresser, he decides to gather all his friends and create the greatest magic trick ever seen."
