  text: "\"Podeszwa shot all the BTS photos for 'LUZ' with a Half-Frame camera. These cameras use 35mm film but capture a smaller frame, resulting in a 16mm format, which is equivalent to the film medium used in the movie. After the shoot, a unique print was created, especially for the director.\""
