  "privacy": {
    "title": "Datenschutzerklärung",
    "paragraphs": [
      "1. Datenschutz auf einen Blick\nAllgemeine HinweiseDie folgenden Hinweise geben einen einfachen Überblick darüber, was mit Ihren personenbezogenen Datenpassiert, wenn Sie diese Website besuchen. Personenbezogene Daten sind alle Daten, mit denen Sie persönlich identifiziert werden können. Ausführliche Informationen zum Thema Datenschutz entnehmen Sie unserer unter diesem Text aufgeführten Datenschutzerklärung.",
      "Datenerfassung auf dieser Website\nWer ist verantwortlich für die Datenerfassung auf dieser Website?Die Datenverarbeitung auf dieser Website erfolgt durch den Websitebetreiber. Dessen Kontaktdatenkönnen Sie dem Abschnitt „Hinweis zur Verantwortlichen Stelle“ in dieser Datenschutzerklärung entnehmen.Wie erfassen wir Ihre Daten? Ihre Daten werden zum einen dadurch erhoben, dass Sie uns diese mitteilen. Hierbei kann es sich z. B. umDaten handeln, die Sie in ein Kontaktformular eingeben.Andere Daten werden automatisch oder nach Ihrer Einwilligung beim Besuch der Website durch unsere ITSystemeerfasst. Das sind vor allem technische Daten (z. B. Internetbrowser, Betriebssystem oder Uhrzeitdes Seitenaufrufs). Die Erfassung dieser Daten erfolgt automatisch, sobald Sie diese Website betreten.Wofür nutzen wir Ihre Daten? Ein Teil der Daten wird erhoben, um eine fehlerfreie Bereitstellung der Website zu gewährleisten. AndereDaten können zur Analyse Ihres Nutzerverhaltens verwendet werden.Welche Rechte haben Sie bezüglich Ihrer Daten?Sie haben jederzeit das Recht, unentgeltlich Auskunft über Herkunft, Empfänger und Zweck Ihrergespeicherten personenbezogenen Daten zu erhalten. Sie haben außerdem ein Recht, die Berichtigung oderLöschung dieser Daten zu verlangen. Wenn Sie eine Einwilligung zur Datenverarbeitung erteilt haben,können Sie diese Einwilligung jederzeit für die Zukunft widerrufen. Außerdem haben Sie das Recht, unterbestimmten Umständen die Einschränkung der Verarbeitung Ihrer personenbezogenen Daten zu verlangen.Des Weiteren steht Ihnen ein Beschwerderecht bei der zuständigen Aufsichtsbehörde zu.Hierzu sowie zu weiteren Fragen zum Thema Datenschutz können Sie sich jederzeit an uns wenden.",
      "Datenerfassung auf dieser Website\nWer ist verantwortlich für die Datenerfassung auf dieser Website?Die Datenverarbeitung auf dieser Website erfolgt durch den Websitebetreiber. Dessen Kontaktdatenkönnen Sie dem Abschnitt „Hinweis zur Verantwortlichen Stelle“ in dieser Datenschutzerklärung entnehmen.Wie erfassen wir Ihre Daten?Ihre Daten werden zum einen dadurch erhoben, dass Sie uns diese mitteilen. Hierbei kann es sich z. B. umDaten handeln, die Sie in ein Kontaktformular eingeben.Andere Daten werden automatisch oder nach Ihrer Einwilligung beim Besuch der Website durch unsere ITSystemeerfasst. Das sind vor allem technische Daten (z. B. Internetbrowser, Betriebssystem oder Uhrzeitdes Seitenaufrufs). Die Erfassung dieser Daten erfolgt automatisch, sobald Sie diese Website betreten.Wofür nutzen wir Ihre Daten?Ein Teil der Daten wird erhoben, um eine fehlerfreie Bereitstellung der Website zu gewährleisten. AndereDaten können zur Analyse Ihres Nutzerverhaltens verwendet werden.Welche Rechte haben Sie bezüglich Ihrer Daten?Sie haben jederzeit das Recht, unentgeltlich Auskunft über Herkunft, Empfänger und Zweck Ihrergespeicherten personenbezogenen Daten zu erhalten. Sie haben außerdem ein Recht, die Berichtigung oderLöschung dieser Daten zu verlangen. Wenn Sie eine Einwilligung zur Datenverarbeitung erteilt haben,können Sie diese Einwilligung jederzeit für die Zukunft widerrufen. Außerdem haben Sie das Recht, unterbestimmten Umständen die Einschränkung der Verarbeitung Ihrer personenbezogenen Daten zu verlangen.Des Weiteren steht Ihnen ein Beschwerderecht bei der zuständigen Aufsichtsbehörde zu.Hierzu sowie zu weiteren Fragen zum Thema Datenschutz können Sie sich jederzeit an uns wenden.",
      "Analyse-Tools und Tools von DrittanbieternBeim Besuch dieser Website kann Ihr Surf-Verhalten statistisch ausgewertet werden. Das geschieht vorallem mit sogenannten Analyseprogrammen.Detaillierte Informationen zu diesen Analyseprogrammen finden Sie in der folgendenDatenschutzerklärung.",
      "2. HostingWir hosten die Inhalte unserer Website bei folgenden Anbietern:WebflowAnbieter ist die Webflow, Inc., 398 11th Street, 2nd Floor, San Francisco, CA 94103, USA (nachfolgendWebflow). Wenn Sie unsere Website besuchen, erfasst Webflow verschiedene Logfiles inklusive Ihrer IPAdressen.Webflow ist ein Tool zum Erstellen und zum Hosten von Websites. Webflow speichert Cookies oder sonstigeWiedererkennungstechnologien, die für die Darstellung der Seite, zur Bereitstellung bestimmterWebseitenfunktionen und zur Gewährleistung der Sicherheit erforderlich sind (notwendige Cookies).Details entnehmen Sie der Datenschutzerklärung von Webflow:https://webflow.com/legal/eu-privacy-policy.\n‍\nDie Verwendung von Webflow erfolgt auf Grundlage von Art. 6 Abs. 1 lit. f DSGVO. Wir haben einberechtigtes Interesse an einer möglichst zuverlässigen Darstellung unserer Website. Sofern eineentsprechende Einwilligung abgefragt wurde, erfolgt die Verarbeitung ausschließlich auf Grundlage von Art.6 Abs. 1 lit. a DSGVO und § 25 Abs. 1 TTDSG, soweit die Einwilligung die Speicherung von Cookies oder denZugriff auf Informationen im Endgerät des Nutzers (z. B. Device-Fingerprinting) im Sinne des TTDSGumfasst. Die Einwilligung ist jederzeit widerrufbar.Die Datenübertragung in die USA wird auf die Standardvertragsklauseln der EU-Kommission gestützt.Details finden Sie hier:https://webflow.com/legal/eu-privacy-policy.Das Unternehmen verfügt über eine Zertifizierung nach dem „EU-US Data Privacy Framework“ (DPF). DerDPF ist ein Übereinkommen zwischen der Europäischen Union und den USA, der die Einhaltungeuropäischer Datenschutzstandards bei Datenverarbeitungen in den USA gewährleisten soll. Jedes nachdem DPF zertifizierte Unternehmen verpflichtet sich, diese Datenschutzstandards einzuhalten. WeitereInformationen hierzu erhalten Sie vom Anbieter unter folgendem Link:https://www.dataprivacyframework.gov/s/participant-search/participantdetail?contact=true&id=a2zt0000000TT9jAAG&status=Active",
      "Externes HostingDiese Website wird extern gehostet. Die personenbezogenen Daten, die auf dieser Website erfasst werden,werden auf den Servern des Hosters / der Hoster gespeichert. Hierbei kann es sich v. a. um IP-Adressen,Kontaktanfragen, Meta- und Kommunikationsdaten, Vertragsdaten, Kontaktdaten, Namen, Websitezugriffeund sonstige Daten, die über eine Website generiert werden, handeln.Das externe Hosting erfolgt zum Zwecke der Vertragserfüllung gegenüber unseren potenziellen undbestehenden Kunden (Art. 6 Abs. 1 lit. b DSGVO) und im Interesse einer sicheren, schnellen und effizientenBereitstellung unseres Online-Angebots durch einen professionellen Anbieter (Art. 6 Abs. 1 lit. f DSGVO).Sofern eine entsprechende Einwilligung abgefragt wurde, erfolgt die Verarbeitung ausschließlich aufGrundlage von Art. 6 Abs. 1 lit. a DSGVO und § 25 Abs. 1 TTDSG, soweit die Einwilligung die Speicherungvon Cookies oder den Zugriff auf Informationen im Endgerät des Nutzers (z. B. Device-Fingerprinting) imSinne des TTDSG umfasst. Die Einwilligung ist jederzeit widerrufbar.Unser(e) Hoster wird bzw. werden Ihre Daten nur insoweit verarbeiten, wie dies zur Erfüllung seinerLeistungspflichten erforderlich ist und unsere Weisungen in Bezug auf diese Daten befolgen.Wir setzen folgende(n) Hoster ein:Cargo Collective",
      "3. Allgemeine Hinweise und PflichtinformationenDatenschutzDie Betreiber dieser Seiten nehmen den Schutz Ihrer persönlichen Daten sehr ernst. Wir behandeln Ihrepersonenbezogenen Daten vertraulich und entsprechend den gesetzlichen Datenschutzvorschriften sowiedieser Datenschutzerklärung.Wenn Sie diese Website benutzen, werden verschiedene personenbezogene Daten erhoben.Personenbezogene Daten sind Daten, mit denen Sie persönlich identifiziert werden können. Die vorliegendeDatenschutzerklärung erläutert, welche Daten wir erheben und wofür wir sie nutzen. Sie erläutert auch, wieund zu welchem Zweck das geschieht.\n\nWir weisen darauf hin, dass die Datenübertragung im Internet (z. B. bei der Kommunikation per E-Mail)Sicherheitslücken aufweisen kann. Ein lückenloser Schutz der Daten vor dem Zugriff durch Dritte ist nichtmöglich.",
      "Hinweis zur verantwortlichen StelleDie verantwortliche Stelle für die Datenverarbeitung auf dieser Website ist:Fabian PodeszwaVenloer Str. 45350825 KölnTelefon: [Telefonnummer der verantwortlichen Stelle]E-Mail: [E-Mail-Adresse der verantwortlichen Stelle]Verantwortliche Stelle ist die natürliche oder juristische Person, die allein oder gemeinsam mit anderen überdie Zwecke und Mittel der Verarbeitung von personenbezogenen Daten (z. B. Namen, E-Mail-Adressen o. Ä.)entscheidet.",
      "SpeicherdauerSoweit innerhalb dieser Datenschutzerklärung keine speziellere Speicherdauer genannt wurde, verbleibenIhre personenbezogenen Daten bei uns, bis der Zweck für die Datenverarbeitung entfällt. Wenn Sie einberechtigtes Löschersuchen geltend machen oder eine Einwilligung zur Datenverarbeitung widerrufen,werden Ihre Daten gelöscht, sofern wir keine anderen rechtlich zulässigen Gründe für die Speicherung Ihrerpersonenbezogenen Daten haben (z. B. steuer- oder handelsrechtliche Aufbewahrungsfristen); imletztgenannten Fall erfolgt die Löschung nach Fortfall dieser Gründe.",
      "Allgemeine Hinweise zu den Rechtsgrundlagen der Datenverarbeitung auf dieserWebsiteSofern Sie in die Datenverarbeitung eingewilligt haben, verarbeiten wir Ihre personenbezogenen Daten aufGrundlage von Art. 6 Abs. 1 lit. a DSGVO bzw. Art. 9 Abs. 2 lit. a DSGVO, sofern besondere Datenkategoriennach Art. 9 Abs. 1 DSGVO verarbeitet werden. Im Falle einer ausdrücklichen Einwilligung in die Übertragungpersonenbezogener Daten in Drittstaaten erfolgt die Datenverarbeitung außerdem auf Grundlage von Art.49 Abs. 1 lit. a DSGVO. Sofern Sie in die Speicherung von Cookies oder in den Zugriff auf Informationen inIhr Endgerät (z. B. via Device-Fingerprinting) eingewilligt haben, erfolgt die Datenverarbeitung zusätzlichauf Grundlage von § 25 Abs. 1 TTDSG. Die Einwilligung ist jederzeit widerrufbar. Sind Ihre Daten zurVertragserfüllung oder zur Durchführung vorvertraglicher Maßnahmen erforderlich, verarbeiten wir IhreDaten auf Grundlage des Art. 6 Abs. 1 lit. b DSGVO. Des Weiteren verarbeiten wir Ihre Daten, sofern diesezur Erfüllung einer rechtlichen Verpflichtung erforderlich sind auf Grundlage von Art. 6 Abs. 1 lit. c DSGVO.Die Datenverarbeitung kann ferner auf Grundlage unseres berechtigten Interesses nach Art. 6 Abs. 1 lit. fDSGVO erfolgen. Über die jeweils im Einzelfall einschlägigen Rechtsgrundlagen wird in den folgendenAbsätzen dieser Datenschutzerklärung informiert.",
      "Empfänger von personenbezogenen DatenIm Rahmen unserer Geschäftstätigkeit arbeiten wir mit verschiedenen externen Stellen zusammen. Dabeiist teilweise auch eine Übermittlung von personenbezogenen Daten an diese externen Stellen erforderlich.Wir geben personenbezogene Daten nur dann an externe Stellen weiter, wenn dies im Rahmen einerVertragserfüllung erforderlich ist, wenn wir gesetzlich hierzu verpflichtet sind (z. B. Weitergabe von Datenan Steuerbehörden), wenn wir ein berechtigtes Interesse nach Art. 6 Abs. 1 lit. f DSGVO an der Weitergabehaben oder wenn eine sonstige Rechtsgrundlage die Datenweitergabe erlaubt. Beim Einsatz vonAuftragsverarbeitern geben wir personenbezogene Daten unserer Kunden nur auf Grundlage eines gültigen Vertrags über Auftragsverarbeitung weiter. Im Falle einer gemeinsamen Verarbeitung wird ein Vertrag übergemeinsame Verarbeitung geschlossen.",
      "Widerruf Ihrer Einwilligung zur DatenverarbeitungViele Datenverarbeitungsvorgänge sind nur mit Ihrer ausdrücklichen Einwilligung möglich. Sie können einebereits erteilte Einwilligung jederzeit widerrufen. Die Rechtmäßigkeit der bis zum Widerruf erfolgtenDatenverarbeitung bleibt vom Widerruf unberührt.",
      "Widerspruchsrecht gegen die Datenerhebung in besonderen Fällen sowie gegenDirektwerbung (Art. 21 DSGVO)WENN DIE DATENVERARBEITUNG AUF GRUNDLAGE VON ART. 6 ABS. 1 LIT. E ODER F DSGVOERFOLGT, HABEN SIE JEDERZEIT DAS RECHT, AUS GRÜNDEN, DIE SICH AUS IHRER BESONDERENSITUATION ERGEBEN, GEGEN DIE VERARBEITUNG IHRER PERSONENBEZOGENEN DATENWIDERSPRUCH EINZULEGEN; DIES GILT AUCH FÜR EIN AUF DIESE BESTIMMUNGEN GESTÜTZTESPROFILING. DIE JEWEILIGE RECHTSGRUNDLAGE, AUF DENEN EINE VERARBEITUNG BERUHT,ENTNEHMEN SIE DIESER DATENSCHUTZERKLÄRUNG. WENN SIE WIDERSPRUCH EINLEGEN,WERDEN WIR IHRE BETROFFENEN PERSONENBEZOGENEN DATEN NICHT MEHR VERARBEITEN, ESSEI DENN, WIR KÖNNEN ZWINGENDE SCHUTZWÜRDIGE GRÜNDE FÜR DIE VERARBEITUNGNACHWEISEN, DIE IHRE INTERESSEN, RECHTE UND FREIHEITEN ÜBERWIEGEN ODER DIEVERARBEITUNG DIENT DER GELTENDMACHUNG, AUSÜBUNG ODER VERTEIDIGUNG VONRECHTSANSPRÜCHEN (WIDERSPRUCH NACH ART. 21 ABS. 1 DSGVO).\n\nWERDEN IHRE PERSONENBEZOGENEN DATEN VERARBEITET, UM DIREKTWERBUNG ZU BETREIBEN,SO HABEN SIE DAS RECHT, JEDERZEIT WIDERSPRUCH GEGEN DIE VERARBEITUNG SIEBETREFFENDER PERSONENBEZOGENER DATEN ZUM ZWECKE DERARTIGER WERBUNGEINZULEGEN; DIES GILT AUCH FÜR DAS PROFILING, SOWEIT ES MIT SOLCHER DIREKTWERBUNG INVERBINDUNG STEHT. WENN SIE WIDERSPRECHEN, WERDEN IHRE PERSONENBEZOGENEN DATENANSCHLIESSEND NICHT MEHR ZUM ZWECKE DER DIREKTWERBUNG VERWENDET (WIDERSPRUCHNACH ART. 21 ABS. 2 DSGVO).",
      "Beschwerderecht bei der zuständigen AufsichtsbehördeIm Falle von Verstößen gegen die DSGVO steht den Betroffenen ein Beschwerderecht bei einerAufsichtsbehörde, insbesondere in dem Mitgliedstaat ihres gewöhnlichen Aufenthalts, ihres Arbeitsplatzesoder des Orts des mutmaßlichen Verstoßes zu. Das Beschwerderecht besteht unbeschadet anderweitigerverwaltungsrechtlicher oder gerichtlicher Rechtsbehelfe.",
      "Recht auf DatenübertragbarkeitSie haben das Recht, Daten, die wir auf Grundlage Ihrer Einwilligung oder in Erfüllung eines Vertragsautomatisiert verarbeiten, an sich oder an einen Dritten in einem gängigen, maschinenlesbaren Formataushändigen zu lassen. Sofern Sie die direkte Übertragung der Daten an einen anderen Verantwortlichenverlangen, erfolgt dies nur, soweit es technisch machbar ist.",
      "Auskunft, Berichtigung und LöschungSie haben im Rahmen der geltenden gesetzlichen Bestimmungen jederzeit das Recht auf unentgeltlicheAuskunft über Ihre gespeicherten personenbezogenen Daten, deren Herkunft und Empfänger und denZweck der Datenverarbeitung und ggf. ein Recht auf Berichtigung oder Löschung dieser Daten. Hierzu sowiezu weiteren Fragen zum Thema personenbezogene Daten können Sie sich jederzeit an uns wenden.",
      "Recht auf Einschränkung der Verarbeitung\nSie haben das Recht, die Einschränkung der Verarbeitung Ihrer personenbezogenen Daten zu verlangen.Hierzu können Sie sich jederzeit an uns wenden. Das Recht auf Einschränkung der Verarbeitung besteht infolgenden Fällen:Wenn Sie die Richtigkeit Ihrer bei uns gespeicherten personenbezogenen Daten bestreiten, benötigen wirin der Regel Zeit, um dies zu überprüfen. Für die Dauer der Prüfung haben Sie das Recht, dieEinschränkung der Verarbeitung Ihrer personenbezogenen Daten zu verlangen.Wenn die Verarbeitung Ihrer personenbezogenen Daten unrechtmäßig geschah/geschieht, können Siestatt der Löschung die Einschränkung der Datenverarbeitung verlangen.Wenn wir Ihre personenbezogenen Daten nicht mehr benötigen, Sie sie jedoch zur Ausübung,Verteidigung oder Geltendmachung von Rechtsansprüchen benötigen, haben Sie das Recht, statt derLöschung die Einschränkung der Verarbeitung Ihrer personenbezogenen Daten zu verlangen.Wenn Sie einen Widerspruch nach Art. 21 Abs. 1 DSGVO eingelegt haben, muss eine Abwägung zwischenIhren und unseren Interessen vorgenommen werden. Solange noch nicht feststeht, wessen Interessenüberwiegen, haben Sie das Recht, die Einschränkung der Verarbeitung Ihrer personenbezogenen Datenzu verlangen.Wenn Sie die Verarbeitung Ihrer personenbezogenen Daten eingeschränkt haben, dürfen diese Daten – vonihrer Speicherung abgesehen – nur mit Ihrer Einwilligung oder zur Geltendmachung, Ausübung oderVerteidigung von Rechtsansprüchen oder zum Schutz der Rechte einer anderen natürlichen oderjuristischen Person oder aus Gründen eines wichtigen öffentlichen Interesses der Europäischen Union odereines Mitgliedstaats verarbeitet werden.",
      "4. Plugins und Tools\nVimeo\nDiese Website nutzt Plugins des Videoportals Vimeo. Anbieter ist die Vimeo Inc., 555 West 18th Street, NewYork, New York 10011, USA.Wenn Sie eine unserer mit einem Vimeo-Video ausgestatteten Seiten besuchen, wird eine Verbindung zuden Servern von Vimeo hergestellt. Dabei wird dem Vimeo-Server mitgeteilt, welche unserer Seiten Siebesucht haben. Zudem erlangt Vimeo Ihre IP-Adresse. Dies gilt auch dann, wenn Sie nicht bei Vimeoeingeloggt sind oder keinen Account bei Vimeo besitzen. Die von Vimeo erfassten Informationen werden anden Vimeo-Server in den USA übermittelt.Wenn Sie in Ihrem Vimeo-Account eingeloggt sind, ermöglichen Sie Vimeo, Ihr Surfverhalten direkt Ihrempersönlichen Profil zuzuordnen. Dies können Sie verhindern, indem Sie sich aus Ihrem Vimeo-Accountausloggen.Zur Wiedererkennung der Websitebesucher verwendet Vimeo Cookies bzw. vergleichbareWiedererkennungstechnologien (z. B. Device-Fingerprinting).Die Nutzung von Vimeo erfolgt im Interesse einer ansprechenden Darstellung unserer Online-Angebote.Dies stellt ein berechtigtes Interesse im Sinne des Art. 6 Abs. 1 lit. f DSGVO dar. Sofern eine entsprechendeEinwilligung abgefragt wurde, erfolgt die Verarbeitung ausschließlich auf Grundlage von Art. 6 Abs. 1 lit. aDSGVO und § 25 Abs. 1 TTDSG, soweit die Einwilligung die Speicherung von Cookies oder den Zugriff aufInformationen im Endgerät des Nutzers (z. B. Device-Fingerprinting) im Sinne des TTDSG umfasst. DieEinwilligung ist jederzeit widerrufbar.Die Datenübertragung in die USA wird auf die Standardvertragsklauseln der EU-Kommission sowie nachAussage von Vimeo auf „berechtigte Geschäftsinteressen“ gestützt. Details finden Sie hier:https://vimeo.com/privacy.\n\nWeitere Informationen zum Umgang mit Nutzerdaten finden Sie in der Datenschutzerklärung von Vimeounter:https://vimeo.com/privacy.Das Unternehmen verfügt über eine Zertifizierung nach dem „EU-US Data Privacy Framework“ (DPF). DerDPF ist ein Übereinkommen zwischen der Europäischen Union und den USA, der die Einhaltungeuropäischer Datenschutzstandards bei Datenverarbeitungen in den USA gewährleisten soll. Jedes nachdem DPF zertifizierte Unternehmen verpflichtet sich, diese Datenschutzstandards einzuhalten. WeitereInformationen hierzu erhalten Sie vom Anbieter unter folgendem Link:https://www.dataprivacyframework.gov/listGoogle FontsDiese Seite nutzt zur einheitlichen Darstellung von Schriftarten so genannte Google Fonts, die von Googlebereitgestellt werden. Beim Aufruf einer Seite lädt Ihr Browser die benötigten Fonts in ihren Browsercache,um Texte und Schriftarten korrekt anzuzeigen.Zu diesem Zweck muss der von Ihnen verwendete Browser Verbindung zu den Servern von Googleaufnehmen. Hierdurch erlangt Google Kenntnis darüber, dass über Ihre IP-Adresse diese Websiteaufgerufen wurde. Die Nutzung von Google Fonts erfolgt auf Grundlage von Art. 6 Abs. 1 lit. f DSGVO. DerWebsitebetreiber hat ein berechtigtes Interesse an der einheitlichen Darstellung des Schriftbildes auf seinerWebsite. Sofern eine entsprechende Einwilligung abgefragt wurde, erfolgt die Verarbeitung ausschließlichauf Grundlage von Art. 6 Abs. 1 lit. a DSGVO und § 25 Abs. 1 TTDSG, soweit die Einwilligung die Speicherungvon Cookies oder den Zugriff auf Informationen im Endgerät des Nutzers (z. B. Device-Fingerprinting) imSinne des TTDSG umfasst. Die Einwilligung ist jederzeit widerrufbar.Wenn Ihr Browser Google Fonts nicht unterstützt, wird eine Standardschrift von Ihrem Computer genutzt.Weitere Informationen zu Google Fonts finden Sie unterhttps://developers.google.com/fonts/faq und in der Datenschutzerklärung von Google:https://policies.google.com/privacy?hl=de.\n\nDas Unternehmen verfügt über eine Zertifizierung nach dem „EU-US Data Privacy Framework“ (DPF). DerDPF ist ein Übereinkommen zwischen der Europäischen Union und den USA, der die Einhaltungeuropäischer Datenschutzstandards bei Datenverarbeitungen in den USA gewährleisten soll. Jedes nachdem DPF zertifizierte Unternehmen verpflichtet sich, diese Datenschutzstandards einzuhalten. WeitereInformationen hierzu erhalten Sie vom Anbieter unter folgendem Link:https://www.dataprivacyframework.gov/s/participant-search/participantdetail?contact=true&id=a2zt000000001L5AAI&status=Active"
