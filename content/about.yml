title: About
text: "Fabian Podeszwa, born in 1990, shot his first horror films on VHS in Austrian hotel rooms. He was part of the emerging YouTube scene in the 2010s – where he learned guerilla-style-filmmaking across departments.\n‍\nHe studied directing and screenwriting at the Academy of Media Arts Cologne and has been working as a freelance filmmaker for over ten years – often in music videos, from DIY to major acts.\n‍\nHis short film Say Wuff! received international awards. He is currently gaining experience on international feature film sets and developing his first feature."
